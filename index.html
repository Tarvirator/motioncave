<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MotionCave — Motion Design Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:Inter,sans-serif;
  background:#0d1117;
  color:white;
  overflow-x:hidden;
}

.container{
  width:90%;
  max-width:1200px;
  margin:auto;
}

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:24px 0;
}

.logo{
  font-size:24px;
  font-weight:800;
}

nav ul{
  display:flex;
  gap:32px;
  list-style:none;
}

nav a{
  color:#9ca3af;
  text-decoration:none;
  transition:.3s;
}

nav a:hover{
  color:white;
}

/* HERO FIXED */

.hero{
  position:relative;
  min-height:80vh;
  display:flex;
  align-items:center;
  overflow:hidden;
  padding:80px;
  border-radius:28px;
  margin-top:20px;
  background:rgba(255,255,255,0.02);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:760px;
}

.hero h1{
  font-size:78px;
  line-height:0.95;
  letter-spacing:-2px;
}

.gradient{
  background:linear-gradient(90deg,#8b5cf6,#06b6d4);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  margin-top:28px;
  font-size:22px;
  color:#9ca3af;
  max-width:620px;
  line-height:1.7;
}

/* Better blob positioning */

.blob{
  position:absolute;
  border-radius:50%;
  filter:blur(160px);
  opacity:.16;
  z-index:0;
  animation:float 14s ease-in-out infinite;
}

.blob1{
  width:600px;
  height:600px;
  background:linear-gradient(135deg,#8b5cf6,#06b6d4);
  top:-220px;
  left:-280px;
}

.blob2{
  width:650px;
  height:650px;
  background:linear-gradient(135deg,#06b6d4,#ec4899);
  right:-300px;
  bottom:-220px;
  animation-delay:4s;
}

@keyframes float{
  0%{
    transform:translate(0,0);
  }
  50%{
    transform:translate(60px,-40px);
  }
  100%{
    transform:translate(0,0);
  }
}

.section{
  padding:90px 0;
}

.section-title{
  font-size:38px;
  margin-bottom:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:24px;
}

.card{
  background:#151b23;
  border:1px solid #202938;
  border-radius:20px;
  overflow:hidden;
  transition:.35s;
}

.card:hover{
  transform:translateY(-8px);
  border-color:#8b5cf6;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content{
  padding:20px;
}

.card-content p{
  margin-top:8px;
  color:#9ca3af;
}

.card a{
  text-decoration:none;
  color:white;
}

/* Workflow */

.workflow-stack{
  display:flex;
  flex-direction:column;
  gap:28px;
  max-width:720px;
}

.workflow-item{
  display:flex;
  gap:24px;
  align-items:flex-start;
  padding:24px;
  border:1px solid #202938;
  border-radius:20px;
  background:#151b23;
  transition:.3s;
}

.workflow-item:hover{
  transform:translateX(8px);
  border-color:#8b5cf6;
}

.workflow-number{
  min-width:56px;
  height:56px;
  border-radius:50%;
  border:1px solid #8b5cf6;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

.workflow-content h3{
  margin-bottom:10px;
}

.workflow-content p{
  color:#9ca3af;
  line-height:1.6;
}

.skills{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}

.skill{
  padding:12px 18px;
  border-radius:999px;
  background:#151b23;
  border:1px solid #202938;
}

footer{
  padding:80px 0;
  text-align:center;
  color:#6b7280;
}

.reveal{
  opacity:0;
  transform:translateY(30px);
  transition:all .8s ease;
}

.reveal.active{
  opacity:1;
  transform:translateY(0);
}

@media(max-width:768px){
  .hero{
    padding:40px;
    min-height:70vh;
  }

  .hero h1{
    font-size:48px;
  }

  .hero p{
    font-size:18px;
  }

  nav{
    flex-direction:column;
    gap:20px;
  }
}
</style>
</head>
<body>

<div class="container">

<nav>
  <div class="logo">MotionCave</div>
  <ul>
    <li><a href="#work">Work</a></li>
    <li><a href="#workflow">Workflow</a></li>
    <li><a href="#tools">Tools</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="hero-content reveal">
    <h1>
      Bringing ideas to life through
      <span class="gradient">motion & storytelling</span>
    </h1>

    <p>
      Motion designer focused on SaaS promos, AI products,
      UI animation, cinematic explainers, and premium product storytelling.
    </p>
  </div>
</section>

<section id="work" class="section reveal">
  <h2 class="section-title">Featured Work</h2>
</section>

<section id="workflow" class="section reveal">
  <h2 class="section-title">Workflow</h2>
</section>

<section id="tools" class="section reveal">
  <h2 class="section-title">Tools</h2>
</section>

<footer id="contact">
  MotionCave © 2026
</footer>

</div>

<script>
const reveals = document.querySelectorAll(".reveal");

function revealOnScroll(){
  reveals.forEach((el,index)=>{
    const top = el.getBoundingClientRect().top;
    const windowHeight = window.innerHeight;

    if(top < windowHeight - 100){
      setTimeout(()=>{
        el.classList.add("active");
      }, index * 150);
    }
  });
}

window.addEventListener("scroll", revealOnScroll);
revealOnScroll();
</script>

</body>
</html>
